<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forum.css">
</head>
<body>
    <nav class="navbar" id="main-navbar">
        <div class="navbar-inner">
            <a href="/" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>

            <div class="nav-right">
                
            </div>
        </div>
    </nav>

    <div class="forum-page">
        <div class="forum-user-header" id="user-header">
            <div class="loading">Loading...</div>
        </div>

        <div class="forum-container">
            <main class="forum-main full-width">
                <div class="posts-list" id="posts-list">
                    <div class="loading">Loading posts...</div>
                </div>

                <div class="forum-pagination" id="pagination"></div>
            </main>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.4.8/umd/index.js"></script>
    
    <script src="/js/main.js"></script>
    <script src="/js/player-model.js"></script>
    <script src="/js/forum.js"></script>
</body>
</html>
