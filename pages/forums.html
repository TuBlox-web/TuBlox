<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuForums — TuBlox</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forums.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/home" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <div class="nav-right">
                <a href="/games" class="btn btn-ghost">Games</a>
                <a href="/TuForums" class="btn btn-ghost active">Forums</a>
                <a href="/users" class="btn btn-ghost">Players</a>
                <span class="nav-user"><strong class="username">Player</strong> <span class="odil-id">#0</span></span>
                <button id="logout-btn" class="btn btn-ghost">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="forums-page">
        <div class="forums-layout">
            <!-- Sidebar -->
            <aside class="forums-sidebar">
                <div class="sidebar-section">
                    <h3>Categories</h3>
                    <div class="category-list">
                        <button class="category-btn active" data-category="all">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                            </svg>
                            All Posts
                        </button>
                        <button class="category-btn" data-category="general">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                            General
                        </button>
                        <button class="category-btn" data-category="games">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="6" width="20" height="12" rx="2"/>
                                <path d="M6 12h4M8 10v4M14 10l4 4M14 14l4-4"/>
                            </svg>
                            Games
                        </button>
                        <button class="category-btn" data-category="bugs">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                                <path d="M2 17l10 5 10-5"/>
                                <path d="M2 12l10 5 10-5"/>
                            </svg>
                            Bug Reports
                        </button>
                        <button class="category-btn" data-category="suggestions">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                            </svg>
                            Suggestions
                        </button>
                        <button class="category-btn" data-category="announcements">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                            </svg>
                            Announcements
                        </button>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <div class="sidebar-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="posts-count">0</span>
                            <span class="stat-label">Posts</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="online-count">1</span>
                            <span class="stat-label">Online</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="forums-main">
                <!-- Connection Status -->
                <div class="connection-status" id="connection-status">
                    <div class="status-dot"></div>
                    <span>Connecting...</span>
                </div>

                <!-- New Post -->
                <div class="new-post-card card" id="new-post-card">
                    <div class="new-post-header">
                        <div class="post-avatar" id="user-avatar"></div>
                        <div class="new-post-info">
                            <span class="post-as">Posting as <strong class="username">Player</strong></span>
                        </div>
                    </div>
                    
                    <div class="new-post-body">
                        <div class="post-options">
                            <select id="post-category" class="post-select">
                                <option value="general">General</option>
                                <option value="games">Games</option>
                                <option value="bugs">Bug Reports</option>
                                <option value="suggestions">Suggestions</option>
                                <option value="announcements">Announcements</option>
                            </select>
                            
                            <div class="staff-options" id="staff-options" style="display: none;">
                                <label class="toggle-option">
                                    <input type="checkbox" id="staff-post-toggle">
                                    <span>Staff Post</span>
                                </label>
                                <label class="toggle-option">
                                    <input type="checkbox" id="pin-post-toggle">
                                    <span>Pin</span>
                                </label>
                            </div>
                        </div>
                        
                        <textarea 
                            id="post-content" 
                            placeholder="What's on your mind?" 
                            maxlength="2000"
                            rows="3"
                        ></textarea>
                        
                        <div class="new-post-footer">
                            <span class="char-counter"><span id="char-count">0</span>/2000</span>
                            <button class="btn btn-primary" id="submit-post" disabled>
                                Post
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Posts Feed -->
                <div class="posts-feed" id="posts-feed">
                    <div class="loading-placeholder large">
                        <div class="spinner"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Reply Modal -->
    <div class="modal" id="reply-modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Reply</h3>
                <button class="modal-close" onclick="closeReplyModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="reply-preview" id="reply-preview"></div>
                <textarea 
                    id="reply-content" 
                    placeholder="Write your reply..." 
                    maxlength="1000"
                    rows="3"
                ></textarea>
                <div class="reply-footer">
                    <span class="char-counter"><span id="reply-char-count">0</span>/1000</span>
                    <button class="btn btn-primary" id="submit-reply">Reply</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/forums.js"></script>
</body>
</html>
