<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox — Home</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-navbar">
        <div class="navbar-inner">
            <a href="/home" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <div class="nav-right"></div>
        </div>
    </nav>

    <div class="home-page">
        <div class="home-content">

            <!-- Welcome -->
            <div class="welcome" id="welcome-block">
                <div class="welcome-left">
                    <h1>Welcome back, <span class="username">Player</span></h1>
                    <p>ID: <strong class="odil-id">#0</strong></p>
                </div>
                <div class="welcome-stats">
                    <div class="welcome-stat">
                        <div class="welcome-stat-val" id="user-level">1</div>
                        <div class="welcome-stat-label">Level</div>
                    </div>
                    <div class="welcome-stat">
                        <div class="welcome-stat-val" id="user-playtime">0h</div>
                        <div class="welcome-stat-label">Played</div>
                    </div>
                </div>
            </div>

            <!-- Games -->
            <div class="section">
                <div class="section-header">
                    <h2>Games</h2>
                </div>
                <div class="games-grid" id="home-games-grid">
                    <div class="loading-placeholder">
                        <div class="spinner"></div>
                    </div>
                </div>
                <div id="home-show-more-wrap" style="display:none; text-align:center; margin-top:20px;">
                    <button class="btn btn-outline" id="home-show-more-btn" onclick="homeShowMore()">
                        Show More
                    </button>
                </div>
            </div>

        </div>
    </div>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.4.8/umd/index.js"></script>
    
    <script src="/js/main.js"></script>
    <script src="/js/player-model.js"></script>
</body>
</html>
