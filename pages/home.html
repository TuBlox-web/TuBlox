<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox — Home</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="main-navbar">
        <div class="navbar-inner">
            <a href="/home" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <div class="nav-right"></div>
        </div>
    </nav>

    <div class="home-page">
        <div class="home-content">
            <!-- Welcome (built by JS) -->
            <div class="welcome"></div>

            <!-- Featured Game -->
            <div class="section">
                <div class="section-header">
                    <h2>Featured Game</h2>
                    <a href="/games" class="btn btn-ghost btn-sm">
                        View All
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </a>
                </div>
                <div class="featured-game-container" id="featured-game">
                    <div class="loading-placeholder"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
