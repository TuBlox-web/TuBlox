<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuBlox</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="landing">
        <div class="landing-bg">
            <img src="/assets/images/preview.png" alt="">
            <div class="landing-overlay"></div>
        </div>

        <nav class="landing-nav">
            <a href="/" class="logo">
                <img src="/img/logo.svg" alt="TuBlox">
                <span>TuBlox</span>
            </a>
            <a href="/auth" class="btn btn-primary">Play Now</a>
        </nav>

        <div class="landing-content">
            <h1></h1>
            <p>play with friends</p>
            <div class="landing-buttons">
                <a href="/auth" class="btn btn-primary btn-lg">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    Get Started
                </a>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
